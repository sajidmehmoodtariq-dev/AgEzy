<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Silo Breakdown – AgEzy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green-dark:#1a3d28;--green-mid:#1b7239;--green:#00ab4f;
  --orange:#f5a623;--red:#d63031;--blue:#2d5bd4;--purple:#7c3aed;
  --text:#1a2a3a;--muted:#8898aa;--border:#eaeef2;--bg:#f4f6f4;--card:#fff;
  --app-scale:1;
}
html,body{width:100%;height:100%;background:#e0e0e0;display:flex;align-items:center;justify-content:center}
.screen{
  width:390px;height:844px;background:var(--bg);border-radius:40px;
  overflow:hidden;position:relative;display:flex;flex-direction:column;
  transform:scale(var(--app-scale));transform-origin:center;
  box-shadow:0 32px 80px rgba(0,0,0,.5);
}
/* Header */
.hdr{background:var(--green-dark);padding:52px 20px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-title{color:#fff;font:700 18px/1 system-ui;flex:1}
.hdr-btn-icon{width:36px;height:36px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Body */
.body{flex:1;overflow-y:auto;padding:16px 20px 100px}
.body::-webkit-scrollbar{display:none}

/* Top Banner */
.banner{background:var(--card);padding:24px 20px;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:20px;}
.banner-label{font:600 13px system-ui;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:0.5px;}
.banner-val{font:800 28px system-ui;color:var(--green);}

/* Silo List */
.silo-list{display:flex;flex-direction:column;gap:12px;margin-bottom:24px;}
.silo-card{background:var(--card);border-radius:16px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.04);cursor:pointer;display:flex;align-items:center;gap:16px;border:2px solid transparent;transition:all 0.2s;}
.silo-card:hover{border-color:var(--green-mid);}
.silo-card.active{border-color:var(--red);} /* Like the mockup red outline */

.silo-icon{width:48px;height:48px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.silo-info{flex:1;}
.silo-name{font:700 15px system-ui;color:var(--text);margin-bottom:4px;}
.silo-stock{font:600 14px system-ui;color:var(--text);margin-bottom:8px;}

/* Progress Bar */
.prog-wrap{width:100%;height:6px;background:var(--border);border-radius:3px;position:relative;overflow:hidden;}
.prog-bar{position:absolute;left:0;top:0;bottom:0;background:var(--blue);border-radius:3px;}

.silo-pct{font:600 13px system-ui;color:var(--muted);text-align:right;}
.silo-arrow{margin-left:8px;opacity:0.5;}

.silo-card:nth-child(1) .prog-bar{width:44%;}
.silo-card:nth-child(2) .prog-bar{width:33%;}
.silo-card:nth-child(3) .prog-bar{width:22%;}

/* Total Row */
.total-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;background:var(--card);border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.total-lbl{font:700 16px system-ui;color:var(--text);}
.total-val{font:700 16px system-ui;color:var(--green);}

</style>

<script src="design-export.js"></script>
</head>
<body>

<div class="screen" id="screen">
  
  <div class="hdr">
    <button class="hdr-back" onclick="window.history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="hdr-title">Silo Breakdown</div>
    <button class="hdr-btn-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
    </button>
  </div>

  <div class="body" id="body">
    
    <div class="banner">
      <div class="banner-label">Total Current Stock</div>
      <div class="banner-val">450 Tonne</div>
    </div>

    <div class="silo-list">
      
      <!-- Silo 1 -->
      <div class="silo-card active" onclick="window.location.href='silo-detail.html'">
        <div class="silo-icon">
          <!-- Silo icon SVG placeholder -->
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="1.5">
            <path d="M4 22V6c0-2.5 4-4 8-4s8 1.5 8 4v16"/>
            <path d="M4 6c0 2.5 4 4 8 4s8-1.5 8-4"/>
            <path d="M4 12c0 2.5 4 4 8 4s8-1.5 8-4"/>
            <path d="M4 18c0 2.5 4 4 8 4s8-1.5 8-4"/>
          </svg>
        </div>
        <div class="silo-info">
          <div class="silo-name">Silo 1 - North</div>
          <div class="silo-stock">200 Tonne</div>
          <div class="prog-wrap"><div class="prog-bar"></div></div>
        </div>
        <div class="silo-pct">44%</div>
        <div class="silo-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>

      <!-- Silo 2 -->
      <div class="silo-card" onclick="window.location.href='silo-detail.html'">
        <div class="silo-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="1.5">
            <path d="M4 22V6c0-2.5 4-4 8-4s8 1.5 8 4v16"/>
            <path d="M4 6c0 2.5 4 4 8 4s8-1.5 8-4"/>
            <path d="M4 12c0 2.5 4 4 8 4s8-1.5 8-4"/>
            <path d="M4 18c0 2.5 4 4 8 4s8-1.5 8-4"/>
          </svg>
        </div>
        <div class="silo-info">
          <div class="silo-name">Silo 2 - East</div>
          <div class="silo-stock">150 Tonne</div>
          <div class="prog-wrap"><div class="prog-bar"></div></div>
        </div>
        <div class="silo-pct">33%</div>
        <div class="silo-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>

      <!-- Silo 3 -->
      <div class="silo-card" onclick="window.location.href='silo-detail.html'">
        <div class="silo-icon">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="1.5">
            <path d="M4 22V6c0-2.5 4-4 8-4s8 1.5 8 4v16"/>
            <path d="M4 6c0 2.5 4 4 8 4s8-1.5 8-4"/>
            <path d="M4 12c0 2.5 4 4 8 4s8-1.5 8-4"/>
            <path d="M4 18c0 2.5 4 4 8 4s8-1.5 8-4"/>
          </svg>
        </div>
        <div class="silo-info">
          <div class="silo-name">Silo 3 - West</div>
          <div class="silo-stock">100 Tonne</div>
          <div class="prog-wrap"><div class="prog-bar"></div></div>
        </div>
        <div class="silo-pct">22%</div>
        <div class="silo-arrow">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>

    </div>

    <div class="total-row">
      <div class="total-lbl">Total</div>
      <div class="total-val">450 Tonne</div>
    </div>

  </div>

  <!-- Bottom Nav -->
                                  <style id="unified-nav-style">
      #unified-nav.bottom-nav {
        flex: 0 0 auto;
        height: 70px;
        background: #fff;
        border-top: 1px solid #e8ede8;
        display: flex; align-items: center; justify-content: space-around;
        padding: 0 10px; gap: 5px;
        margin-top: auto; z-index: 100;
        position: relative;
      }
      #unified-nav .nav-item {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 4px;
        cursor: pointer; padding: 6px 4px; border: none; background: transparent; text-decoration: none;
      }
      #unified-nav .nav-icon {
        width: 44px; height: 44px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 50%;
      }
      #unified-nav .nav-icon.active { background: var(--green-dark, #1b7239); }
      #unified-nav .nav-icon img, #unified-nav .nav-icon svg { width: 22px; height: 22px; opacity: 0.8; }
      #unified-nav .nav-icon.active img { filter: brightness(0) invert(1) !important; opacity: 1; }
      #unified-nav .nav-icon.active svg { stroke: #fff !important; opacity: 1; }
      #unified-nav .nav-label { font-size: 9px; font-weight: 600; color: var(--muted, #8898aa); text-align: center; line-height: 1.1; white-space: nowrap; margin: 0; }
      #unified-nav .nav-item.active .nav-label { color: var(--green-dark, #1b7239); }
    </style>
    <nav id="unified-nav" class="bottom-nav">
      <!-- Home -->
      <div class="nav-item " onclick="window.location.href='dashboard.html'">
        <div class="nav-icon "><img src="images/nav-home.png" alt="Home" /></div>
        <div class="nav-label">Home</div>
      </div>
      <!-- Contracting -->
      <div class="nav-item " onclick="window.location.href='jobs-hub.html'">
        <div class="nav-icon "><img src="images/nav-contract-work.png" alt="Contracting" /></div>
        <div class="nav-label">Contracting</div>
      </div>
      <!-- Inventory -->
      <div class="nav-item " onclick="window.location.href='commodity-catalog.html'">
        <div class="nav-icon ">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </div>
        <div class="nav-label">Inventory</div>
      </div>
      <!-- Timesheets -->
      <div class="nav-item " onclick="window.location.href='timesheets-list.html'">
        <div class="nav-icon "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div class="nav-label">Timesheets</div>
      </div>
      <!-- Map -->
      <div class="nav-item " onclick="window.location.href='farm-map.html'">
        <div class="nav-icon "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg></div>
        <div class="nav-label">Map</div>
      </div>
    </nav>
  </div>

<script>
  function applyScale() {
    const screen = document.getElementById('screen');
    const wh = window.innerHeight;
    if (wh < 880) {
      const scale = Math.min(1, (wh - 40) / 844);
      screen.style.setProperty('--app-scale', scale);
    } else {
      screen.style.setProperty('--app-scale', 1);
    }
  }
  window.addEventListener('resize', applyScale);
  applyScale();
</script>
</body>
</html>
