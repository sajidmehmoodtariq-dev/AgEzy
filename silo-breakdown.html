<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AgEzy – Silo Breakdown</title>
  <style>
    :root{
      --green-dark:#1a3d28;--green-mid:#1b7239;--green:#00ab4f;
      --orange:#f5a623;--red:#d63031;--blue:#2d5bd4;
      --text:#1a2a3a;--muted:#8898aa;--border:#eaeef2;--bg:#f4f6f4;--card:#fff;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;background:#e0e0e0;font-family:"Segoe UI",system-ui,sans-serif;overflow:hidden;}
    .viewport{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:16px;}
    .screen{width:390px;height:844px;transform:scale(var(--app-scale,1));transform-origin:center;background:var(--bg);border-radius:26px;overflow:hidden;box-shadow:0 28px 80px rgba(0,0,0,.22);display:flex;flex-direction:column;position:relative;}

    .header{flex:0 0 auto;background:var(--green-dark);padding:14px 16px 12px;display:flex;align-items:center;gap:10px;}
    .h-back{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#fff;}
    .h-title{flex:1;font-size:20px;font-weight:800;color:#fff;letter-spacing:-.03em;text-align:center;margin-right:34px;}

    /* BODY */
    .body{flex:1;overflow-y:auto;padding:16px 14px 20px;scrollbar-width:none;}
    .body::-webkit-scrollbar{display:none;}

    .section-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:12px;margin-top:10px;}

    /* SILO CARD */
    .silo-card{background:var(--card);border-radius:16px;padding:16px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.03);margin-bottom:12px;border:2px solid transparent;transition:all .15s;}
    .silo-card:active{transform:scale(.98);border-color:var(--green-mid);}
    
    .silo-info{flex:1;}
    .silo-name{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px;}
    .silo-sub{font-size:12px;color:var(--muted);font-weight:500;}

    .silo-right{text-align:right;}
    .silo-amt{font-size:18px;font-weight:900;color:var(--text);}
    .silo-cap{font-size:11px;color:var(--muted);margin-top:2px;}

    .prog-bg{height:6px;border-radius:3px;background:var(--border);margin-top:10px;overflow:hidden;width:100%;}
    .prog-fill{height:100%;background:var(--green-mid);border-radius:3px;}
    .prog-fill.full{background:var(--red);}

    @media(max-width:767px){.viewport{padding:0}.screen{width:390px;height:844px;border-radius:0;box-shadow:none}}
  </style>
</head>
<body>
<div class="viewport"><main class="screen">

  <header class="header">
    <button class="h-back" onclick="window.location.href='commodity-details.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="h-title">Silo Breakdown</div>
  </header>

  <div class="body">
    <div style="font-size:13px;color:var(--muted);margin-bottom:16px;">Viewing storage distribution for <strong>Wheat (APW1)</strong>. Total: 450 t</div>
    
    <div class="silo-card" onclick="window.location.href='silo-details.html'">
      <div style="width:100%">
        <div style="display:flex;justify-content:space-between">
          <div class="silo-info">
            <div class="silo-name">Silo 1 (Main)</div>
            <div class="silo-sub">Location: North Yard</div>
          </div>
          <div class="silo-right">
            <div class="silo-amt">200 t</div>
            <div class="silo-cap">Capacity: 250 t</div>
          </div>
        </div>
        <div class="prog-bg"><div class="prog-fill" style="width:80%"></div></div>
      </div>
    </div>

    <div class="silo-card" onclick="window.location.href='silo-details.html'">
      <div style="width:100%">
        <div style="display:flex;justify-content:space-between">
          <div class="silo-info">
            <div class="silo-name">Silo 2</div>
            <div class="silo-sub">Location: South Paddock</div>
          </div>
          <div class="silo-right">
            <div class="silo-amt">150 t</div>
            <div class="silo-cap">Capacity: 150 t</div>
          </div>
        </div>
        <div class="prog-bg"><div class="prog-fill full" style="width:100%"></div></div>
      </div>
    </div>

    <div class="silo-card" onclick="window.location.href='silo-details.html'">
      <div style="width:100%">
        <div style="display:flex;justify-content:space-between">
          <div class="silo-info">
            <div class="silo-name">Silo 5 (Overflow)</div>
            <div class="silo-sub">Location: North Yard</div>
          </div>
          <div class="silo-right">
            <div class="silo-amt">100 t</div>
            <div class="silo-cap">Capacity: 500 t</div>
          </div>
        </div>
        <div class="prog-bg"><div class="prog-fill" style="width:20%"></div></div>
      </div>
    </div>
  </div>

</main></div>
<script>
  const baseW=390,baseH=844,pad=32;
  const scale=()=>{const s=Math.min((innerWidth-pad)/baseW,(innerHeight-pad)/baseH,1);document.documentElement.style.setProperty('--app-scale',s.toFixed(4));};
  scale();addEventListener('resize',scale);
</script>
</body>
</html>
