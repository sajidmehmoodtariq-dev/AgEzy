<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Commodity Details – AgEzy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green-dark:#1a3d28;--green-mid:#1b7239;--green:#00ab4f;
  --orange:#f5a623;--red:#d63031;--blue:#2d5bd4;--purple:#7c3aed;
  --text:#1a2a3a;--muted:#8898aa;--border:#eaeef2;--bg:#f4f6f4;--card:#fff;
  --app-scale:1;
}
html,body{width:100%;height:100%;background:#e0e0e0;display:flex;align-items:center;justify-content:center}
.screen{
  width:390px;height:844px;background:var(--bg);border-radius:40px;
  overflow:hidden;position:relative;display:flex;flex-direction:column;
  transform:scale(var(--app-scale));transform-origin:center;
  box-shadow:0 32px 80px rgba(0,0,0,.5);
}
/* Header */
.hdr{background:var(--green-dark);padding:52px 20px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-title{color:#fff;font:700 18px/1 system-ui;flex:1}
.hdr-btn{background:rgba(255,255,255,.15);border:none;border-radius:20px;padding:7px 14px;color:#fff;font:600 13px system-ui;cursor:pointer;display:flex;align-items:center;gap:6px}
.hdr-btn-icon{width:36px;height:36px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Body */
.body{flex:1;overflow-y:auto;padding:16px 20px 100px}
.body::-webkit-scrollbar{display:none}

/* Top Overview Card */
.overview-card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;align-items:center;gap:16px;}
.overview-icon{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:#fff8e1;flex-shrink:0;}
.overview-icon svg{width:32px;height:32px;fill:var(--orange);}
.overview-info{flex:1;}
.overview-title{font:700 20px system-ui;color:var(--text);margin-bottom:4px;}
.overview-subtitle{font:400 13px system-ui;color:var(--muted);margin-bottom:8px;}
.overview-tag{display:inline-block;padding:4px 8px;border-radius:8px;font:600 11px system-ui;background:#fff8e1;color:#b27b16;}
.overview-right{text-align:right;}
.overview-price{font:700 20px system-ui;color:var(--text);}
.overview-unit{font:400 12px system-ui;color:var(--muted);margin-bottom:4px;}
.overview-stock{font:600 13px system-ui;color:var(--green);}

/* Details Section */
.sec-title{font:700 12px system-ui;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}

.detail-list{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:20px;}
.detail-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.detail-row:last-child{border-bottom:none;}
.detail-label{font:500 14px system-ui;color:var(--muted);}
.detail-val{font:600 14px system-ui;color:var(--text);}
.detail-val.link{color:var(--text);display:flex;align-items:center;gap:4px;cursor:pointer;}
.detail-val.link svg{stroke:var(--muted);}
.detail-val.highlight{background:#eef6f0;color:var(--green);padding:4px 8px;border-radius:6px;margin:-4px -8px;}

/* Breakdown Button */
.btn-outline{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;border-radius:12px;border:1.5px solid var(--border);background:transparent;font:600 15px system-ui;color:var(--text);cursor:pointer;margin-bottom:20px;}

/* Actions */
.actions-row{display:flex;gap:10px;}
.btn-action{flex:1;padding:14px;border-radius:12px;font:600 15px system-ui;text-align:center;cursor:pointer;}
.btn-action.secondary{background:#fff;border:1.5px solid var(--border);color:var(--text);}
.btn-action.primary{background:var(--green);border:none;color:#fff;}

</style>

<script src="design-export.js"></script>
</head>
<body>

<div class="screen" id="screen">
  
  <div class="hdr">
    <button class="hdr-back" onclick="window.history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="hdr-title">Commodity Details</div>
    <button class="hdr-btn-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><path d="M12 20h9M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
    </button>
  </div>

  <div class="body" id="body">
    
    <div class="overview-card">
      <div class="overview-icon">
        <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
      </div>
      <div class="overview-info">
        <div class="overview-title">Wheat</div>
        <div class="overview-subtitle">APW1 grade, 11.5% protein</div>
        <div class="overview-tag">Grain</div>
      </div>
      <div class="overview-right">
        <div class="overview-price">$320</div>
        <div class="overview-unit">per Tonne</div>
        <div class="overview-stock">450 Tonne</div>
      </div>
    </div>

    <div class="sec-title">STOCK OVERVIEW</div>
    <div class="detail-list">
      <div class="detail-row">
        <div class="detail-label">Commodity ID</div>
        <div class="detail-val">C001</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Unit</div>
        <div class="detail-val">Tonne</div>
      </div>
      <div class="detail-row" onclick="window.location.href='silo-breakdown.html'" style="cursor:pointer; background:#fcfcfc;">
        <div class="detail-label">Current Stock</div>
        <div class="detail-val link highlight">
          450 Tonne
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
        </div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Low Stock Alert</div>
        <div class="detail-val">100 Tonne</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Price / Unit</div>
        <div class="detail-val">$320 / Tonne</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Est. Total Value</div>
        <div class="detail-val">$144,000</div>
      </div>
    </div>

    <button class="btn-outline" onclick="window.location.href='silo-breakdown.html'">
      View Silo Breakdown
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18M9 9l3 3 3-3M15 15l3 3 3-3"/></svg>
    </button>

    <div class="actions-row">
      <div class="btn-action secondary">Edit</div>
      <div class="btn-action secondary">Delete</div>
      <div class="btn-action primary" onclick="startStockOut()">Stock Out</div>
    </div>

  </div>

  <!-- Bottom Nav will be injected here (we can manually add the standard bottom nav block if needed or just let it be handled by a script, but I'll add the unified style block directly so it renders correctly right away) -->
                                  <style id="unified-nav-style">
      #unified-nav.bottom-nav {
        flex: 0 0 auto;
        height: 70px;
        background: #fff;
        border-top: 1px solid #e8ede8;
        display: flex; align-items: center; justify-content: space-around;
        padding: 0 10px; gap: 5px;
        margin-top: auto; z-index: 100;
        position: relative;
      }
      #unified-nav .nav-item {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 4px;
        cursor: pointer; padding: 6px 4px; border: none; background: transparent; text-decoration: none;
      }
      #unified-nav .nav-icon {
        width: 44px; height: 44px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 50%;
      }
      #unified-nav .nav-icon.active { background: var(--green-dark, #1b7239); }
      #unified-nav .nav-icon img, #unified-nav .nav-icon svg { width: 22px; height: 22px; opacity: 0.8; }
      #unified-nav .nav-icon.active img { filter: brightness(0) invert(1) !important; opacity: 1; }
      #unified-nav .nav-icon.active svg { stroke: #fff !important; opacity: 1; }
      #unified-nav .nav-label { font-size: 9px; font-weight: 600; color: var(--muted, #8898aa); text-align: center; line-height: 1.1; white-space: nowrap; margin: 0; }
      #unified-nav .nav-item.active .nav-label { color: var(--green-dark, #1b7239); }
    </style>
    <nav id="unified-nav" class="bottom-nav">
      <!-- Home -->
      <div class="nav-item " onclick="window.location.href='dashboard.html'">
        <div class="nav-icon "><img src="images/nav-home.png" alt="Home" /></div>
        <div class="nav-label">Home</div>
      </div>
      <!-- Contracting -->
      <div class="nav-item " onclick="window.location.href='jobs-hub.html'">
        <div class="nav-icon "><img src="images/nav-contract-work.png" alt="Contracting" /></div>
        <div class="nav-label">Contracting</div>
      </div>
      <!-- Inventory -->
      <div class="nav-item active" onclick="window.location.href='commodity-catalog.html'">
        <div class="nav-icon active">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </div>
        <div class="nav-label">Inventory</div>
      </div>
      <!-- Timesheets -->
      <div class="nav-item " onclick="window.location.href='timesheets-list.html'">
        <div class="nav-icon "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div class="nav-label">Timesheets</div>
      </div>
      <!-- Map -->
      <div class="nav-item " onclick="window.location.href='farm-map.html'">
        <div class="nav-icon "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg></div>
        <div class="nav-label">Map</div>
      </div>
    </nav>
  </div>

<script>
  function applyScale() {
    const screen = document.getElementById('screen');
    const wh = window.innerHeight;
    if (wh < 880) {
      const scale = Math.min(1, (wh - 40) / 844);
      screen.style.setProperty('--app-scale', scale);
    } else {
      screen.style.setProperty('--app-scale', 1);
    }
  }
  window.addEventListener('resize', applyScale);
  applyScale();

  function startStockOut() {
    const title = document.querySelector('.overview-title')?.textContent || 'Wheat';
    window.location.href = `load-out.html?commodity=${encodeURIComponent(title)}`;
  }
</script>
</body>
</html>
