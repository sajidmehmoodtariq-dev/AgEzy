<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Location Details – AgEzy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green-dark:#1a3d28;--green-mid:#1b7239;--green:#00ab4f;
  --orange:#f5a623;--red:#d63031;--blue:#2d5bd4;--purple:#7c3aed;
  --text:#1a2a3a;--muted:#8898aa;--border:#eaeef2;--bg:#f4f6f4;--card:#fff;
  --app-scale:1;
}
html,body{width:100%;height:100%;background:#e0e0e0;display:flex;align-items:center;justify-content:center}
.screen{
  width:390px;height:844px;background:var(--bg);border-radius:40px;
  overflow:hidden;position:relative;display:flex;flex-direction:column;
  transform:scale(var(--app-scale));transform-origin:center;
  box-shadow:0 32px 80px rgba(0,0,0,.5);
}
/* Header */
.hdr{background:var(--green-dark);padding:52px 20px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-title{color:#fff;font:700 18px/1 system-ui;flex:1}
.hdr-btn-icon{width:36px;height:36px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Body */
.body{flex:1;overflow-y:auto;padding:16px 20px 100px}
.body::-webkit-scrollbar{display:none}

/* Map Preview Header */
.map-preview{height:160px;border-radius:16px;overflow:hidden;margin-bottom:16px;position:relative;background:#d8ead8;box-shadow:0 2px 8px rgba(0,0,0,.04);}
.map-img{width:100%;height:100%;object-fit:cover;}
.map-pin{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:40px;height:40px;background:var(--blue);border:3px solid #fff;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 10px rgba(0,0,0,.2);}
.map-pin svg{width:20px;height:20px;stroke:#fff;}

/* Location Info */
.loc-title{font:700 22px system-ui;color:var(--text);margin-bottom:4px;}
.loc-type{font:600 14px system-ui;color:var(--muted);margin-bottom:12px;}

.detail-list{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:20px;}
.detail-row{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--border);}
.detail-row:last-child{border-bottom:none;}
.detail-label{font:500 13px system-ui;color:var(--muted);}
.detail-val{font:600 13px system-ui;color:var(--text);}

/* View Map Button */
.btn-primary{display:flex;align-items:center;justify-content:space-between;width:100%;padding:16px 20px;border-radius:12px;background:var(--green-mid);border:none;color:#fff;font:700 16px system-ui;cursor:pointer;margin-bottom:24px;}
.btn-primary svg{stroke:#fff;}

/* Silos Section */
.sec-title{font:700 12px system-ui;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;}

.silo-list{display:flex;flex-direction:column;gap:12px;}
.silo-card{background:var(--card);border-radius:16px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;align-items:center;gap:16px;}
.silo-icon{width:40px;height:40px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.silo-info{flex:1;}
.silo-name{font:700 14px system-ui;color:var(--text);}
.silo-qty{font:700 14px system-ui;color:var(--green);}

</style>

<script src="design-export.js"></script>
</head>
<body>

<div class="screen" id="screen">
  
  <div class="hdr">
    <button class="hdr-back" onclick="window.history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="hdr-title">Location Details</div>
    <button class="hdr-btn-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </button>
  </div>

  <div class="body" id="body">
    
    <div class="map-preview" onclick="window.location.href='farm-map.html'" style="cursor:pointer;">
      <div style="width:100%;height:100%;background:url('https://maps.googleapis.com/maps/api/staticmap?center=-27.123456,152.654321&zoom=15&size=400x200&maptype=satellite') center/cover;"></div>
      <div class="map-pin">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
    </div>

    <div class="loc-title">North Farm</div>
    <div class="loc-type">Storage Area</div>

    <div class="detail-list">
      <div class="detail-row">
        <div class="detail-label">Latitude</div>
        <div class="detail-val">-27.123456</div>
      </div>
      <div class="detail-row">
        <div class="detail-label">Longitude</div>
        <div class="detail-val">152.654321</div>
      </div>
    </div>

    <button class="btn-primary" onclick="window.location.href='farm-map.html'">
      <div style="display:flex;align-items:center;gap:10px;">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 6v16l7-4 8 4 7-4V2l-7 4-8-4-7 4z"/><path d="M8 2v16M16 6v16"/></svg>
        View Map
      </div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </button>

    <div class="sec-title">SILOS AT THIS LOCATION</div>
    <div class="silo-list">
      <div class="silo-card">
        <div class="silo-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="1.5">
            <path d="M4 22V6c0-2.5 4-4 8-4s8 1.5 8 4v16"/>
            <path d="M4 6c0 2.5 4 4 8 4s8-1.5 8-4"/>
          </svg>
        </div>
        <div class="silo-info">
          <div class="silo-name">Silo 1 - North</div>
        </div>
        <div class="silo-qty">200 Tonne</div>
      </div>

      <div class="silo-card">
        <div class="silo-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="1.5">
            <path d="M4 22V6c0-2.5 4-4 8-4s8 1.5 8 4v16"/>
            <path d="M4 6c0 2.5 4 4 8 4s8-1.5 8-4"/>
          </svg>
        </div>
        <div class="silo-info">
          <div class="silo-name">Silo 2 - East</div>
        </div>
        <div class="silo-qty">150 Tonne</div>
      </div>

      <div class="silo-card">
        <div class="silo-icon">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="1.5">
            <path d="M4 22V6c0-2.5 4-4 8-4s8 1.5 8 4v16"/>
            <path d="M4 6c0 2.5 4 4 8 4s8-1.5 8-4"/>
          </svg>
        </div>
        <div class="silo-info">
          <div class="silo-name">Silo 3 - West</div>
        </div>
        <div class="silo-qty">100 Tonne</div>
      </div>
    </div>

  </div>

  <!-- Bottom Nav -->
                                  <style id="unified-nav-style">
      #unified-nav.bottom-nav {
        flex: 0 0 auto;
        height: 70px;
        background: #fff;
        border-top: 1px solid #e8ede8;
        display: flex; align-items: center; justify-content: space-around;
        padding: 0 10px; gap: 5px;
        margin-top: auto; z-index: 100;
        position: relative;
      }
      #unified-nav .nav-item {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 4px;
        cursor: pointer; padding: 6px 4px; border: none; background: transparent; text-decoration: none;
      }
      #unified-nav .nav-icon {
        width: 44px; height: 44px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 50%;
      }
      #unified-nav .nav-icon.active { background: var(--green-dark, #1b7239); }
      #unified-nav .nav-icon img, #unified-nav .nav-icon svg { width: 22px; height: 22px; opacity: 0.8; }
      #unified-nav .nav-icon.active img { filter: brightness(0) invert(1) !important; opacity: 1; }
      #unified-nav .nav-icon.active svg { stroke: #fff !important; opacity: 1; }
      #unified-nav .nav-label { font-size: 9px; font-weight: 600; color: var(--muted, #8898aa); text-align: center; line-height: 1.1; white-space: nowrap; margin: 0; }
      #unified-nav .nav-item.active .nav-label { color: var(--green-dark, #1b7239); }
    </style>
    <nav id="unified-nav" class="bottom-nav">
      <!-- Home -->
      <div class="nav-item " onclick="window.location.href='dashboard.html'">
        <div class="nav-icon "><img src="images/nav-home.png" alt="Home" /></div>
        <div class="nav-label">Home</div>
      </div>
      <!-- Contracting -->
      <div class="nav-item " onclick="window.location.href='jobs-hub.html'">
        <div class="nav-icon "><img src="images/nav-contract-work.png" alt="Contracting" /></div>
        <div class="nav-label">Contracting</div>
      </div>
      <!-- Inventory -->
      <div class="nav-item " onclick="window.location.href='commodity-catalog.html'">
        <div class="nav-icon ">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </div>
        <div class="nav-label">Inventory</div>
      </div>
      <!-- Timesheets -->
      <div class="nav-item " onclick="window.location.href='timesheets-list.html'">
        <div class="nav-icon "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div class="nav-label">Timesheets</div>
      </div>
      <!-- Map -->
      <div class="nav-item " onclick="window.location.href='farm-map.html'">
        <div class="nav-icon "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg></div>
        <div class="nav-label">Map</div>
      </div>
    </nav>
  </div>

<script>
  function applyScale() {
    const screen = document.getElementById('screen');
    const wh = window.innerHeight;
    if (wh < 880) {
      const scale = Math.min(1, (wh - 40) / 844);
      screen.style.setProperty('--app-scale', scale);
    } else {
      screen.style.setProperty('--app-scale', 1);
    }
  }
  window.addEventListener('resize', applyScale);
  applyScale();
</script>
</body>
</html>
