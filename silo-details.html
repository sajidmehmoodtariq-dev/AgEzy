<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AgEzy – Silo Details</title>
  <style>
    :root{
      --green-dark:#1a3d28;--green-mid:#1b7239;--green:#00ab4f;
      --orange:#f5a623;--red:#d63031;--blue:#2d5bd4;
      --text:#1a2a3a;--muted:#8898aa;--border:#eaeef2;--bg:#f4f6f4;--card:#fff;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{width:100%;height:100%;background:#e0e0e0;font-family:"Segoe UI",system-ui,sans-serif;overflow:hidden;}
    .viewport{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:16px;}
    .screen{width:390px;height:844px;transform:scale(var(--app-scale,1));transform-origin:center;background:var(--bg);border-radius:26px;overflow:hidden;box-shadow:0 28px 80px rgba(0,0,0,.22);display:flex;flex-direction:column;position:relative;}

    .header{flex:0 0 auto;background:var(--green-dark);padding:14px 16px 12px;display:flex;align-items:center;gap:10px;}
    .h-back{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.12);display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;color:#fff;}
    .h-title{flex:1;font-size:20px;font-weight:800;color:#fff;letter-spacing:-.03em;text-align:center;margin-right:34px;}

    /* HERO */
    .hero{background:var(--card);padding:24px 16px;text-align:center;border-bottom:1px solid var(--border);}
    .silo-icon{width:64px;height:64px;border-radius:18px;background:#e4f8ee;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;color:var(--green-mid);}
    .silo-name{font-size:24px;font-weight:900;color:var(--text);margin-bottom:4px;}
    .silo-desc{font-size:14px;color:var(--muted);margin-bottom:16px;}
    
    .circle-wrap{position:relative;width:120px;height:120px;margin:0 auto 16px;}
    .circle-bg{fill:none;stroke:var(--border);stroke-width:10;}
    .circle-fill{fill:none;stroke:var(--green-mid);stroke-width:10;stroke-dasharray:314;stroke-dashoffset:62;stroke-linecap:round;}
    .circle-text{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}
    .c-pct{font-size:24px;font-weight:900;color:var(--text);}
    .c-lbl{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;}

    /* BODY */
    .body{flex:1;overflow-y:auto;padding:16px 14px 20px;scrollbar-width:none;}
    .body::-webkit-scrollbar{display:none;}

    .section-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:12px;}

    /* ACTION BUTTON */
    .flow-btn{background:var(--card);border-radius:16px;padding:18px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;box-shadow:0 4px 12px rgba(0,0,0,.04);margin-bottom:20px;border:2px solid transparent;transition:all .15s;}
    .flow-btn:active{transform:scale(.98);border-color:var(--green-mid);}
    .flow-info{flex:1;}
    .flow-title{font-size:16px;font-weight:800;color:var(--text);margin-bottom:4px;}
    .flow-sub{font-size:13px;color:var(--muted);font-weight:500;}
    .flow-icon{width:40px;height:40px;border-radius:12px;background:#eef2ee;display:flex;align-items:center;justify-content:center;color:var(--green-dark);}

    .detail-list{background:var(--card);border-radius:16px;padding:8px 16px;margin-bottom:20px;}
    .detail-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);}
    .detail-row:last-child{border-bottom:none;}
    .detail-lbl{font-size:13px;color:var(--muted);font-weight:500;}
    .detail-val{font-size:13px;font-weight:700;color:var(--text);}

    @media(max-width:767px){.viewport{padding:0}.screen{width:390px;height:844px;border-radius:0;box-shadow:none}}
  </style>
</head>
<body>
<div class="viewport"><main class="screen">

  <header class="header">
    <button class="h-back" onclick="window.location.href='silo-breakdown.html'">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M12 5l-7 7 7 7" stroke="#fff" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </button>
    <div class="h-title">Silo Details</div>
  </header>

  <div class="hero">
    <div class="silo-icon">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M4 10h16M10 4v16"/></svg>
    </div>
    <div class="silo-name">Silo 1 (Main)</div>
    <div class="silo-desc">Storing: Wheat (APW1)</div>
    
    <div class="circle-wrap">
      <svg width="120" height="120" viewBox="0 0 120 120">
        <circle class="circle-bg" cx="60" cy="60" r="50"></circle>
        <circle class="circle-fill" cx="60" cy="60" r="50"></circle>
      </svg>
      <div class="circle-text">
        <div class="c-pct">80%</div>
        <div class="c-lbl">Full</div>
      </div>
    </div>
  </div>

  <div class="body">
    <!-- Navigate to Location Page -->
    <div class="flow-btn" onclick="window.location.href='location-page.html'">
      <div class="flow-info">
        <div class="flow-title">Location Information</div>
        <div class="flow-sub">View site and access details</div>
      </div>
      <div class="flow-icon">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z" stroke="currentColor" stroke-width="2"/><circle cx="12" cy="10" r="3" stroke="currentColor" stroke-width="2"/></svg>
      </div>
    </div>

    <div class="section-title">Silo Information</div>
    <div class="detail-list">
      <div class="detail-row">
        <div class="detail-lbl">Current Fill</div>
        <div class="detail-val">200 t</div>
      </div>
      <div class="detail-row">
        <div class="detail-lbl">Total Capacity</div>
        <div class="detail-val">250 t</div>
      </div>
      <div class="detail-row">
        <div class="detail-lbl">Last Inspection</div>
        <div class="detail-val">Oct 15, 2023</div>
      </div>
      <div class="detail-row">
        <div class="detail-lbl">Status</div>
        <div class="detail-val" style="color:var(--green-mid)">Operational</div>
      </div>
    </div>
  </div>

</main></div>
<script>
  const baseW=390,baseH=844,pad=32;
  const scale=()=>{const s=Math.min((innerWidth-pad)/baseW,(innerHeight-pad)/baseH,1);document.documentElement.style.setProperty('--app-scale',s.toFixed(4));};
  scale();addEventListener('resize',scale);
</script>
</body>
</html>
