<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AgEzy — Stock Movements</title>
  <style>
    :root {
      --green-dark: #1a3d28;
      --green-mid: #1b7239;
      --green-accent: #00ab4f;
      --blue: #4a6cf7;
      --blue-light: #eef1fd;
      --red: #d63031;
      --red-light: #fdeef0;
      --green-light: #edfaf2;
      --purple: #7b1545;
      --purple-light: #fde8f2;
      --transfer-blue: #2d5bd4;
      --transfer-light: #edf1fd;
      --orange: #e67e22;
      --orange-light: #fdf2e9;
      --grey: #95a5a6;
      --grey-light: #f0f3f4;
      --text: #1a2a3a;
      --muted: #8898aa;
      --border: #dde8dd;
      --bg: #f2f4f2;
      --card: #fff;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #e0e0e0;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      overflow: hidden;
    }

    .viewport {
      position: fixed; inset: 0;
      display: flex; align-items: center; justify-content: center;
      padding: 16px;
    }

    .screen {
      position: relative;
      width: 390px; height: 844px;
      transform: scale(var(--app-scale, 1));
      transform-origin: center center;
      background: var(--bg);
      border-radius: 26px;
      overflow: hidden;
      box-shadow: 0 28px 80px rgba(0,0,0,0.22);
      display: flex;
      flex-direction: column;
    }

    /* ─── PANEL SYSTEM ─── */
    .panel {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      transform: translateX(100%);
      transition: transform 340ms cubic-bezier(.4,0,.2,1);
      background: var(--bg);
      z-index: 10;
    }
    .panel.orig-active, .panel.active    { transform: translateX(0); z-index: 20; }
    .panel.orig-exit-left, .panel.exit-left { transform: translateX(-100%); z-index: 10; }

    /* ─── SHARED HEADER ─── */
    .top-header {
      flex: 0 0 auto;
      background: var(--green-dark);
      height: 60px;
      display: flex; align-items: center;
      padding: 0 16px; gap: 12px;
      color: #fff;
    }
    .th-back { cursor: pointer; padding: 4px; margin-left: -4px; display: flex; align-items: center; }
    .th-title {
      flex: 1; font-size: 17px; font-weight: 700;
      letter-spacing: -0.01em; text-align: center;
      margin-right: 28px; /* offset back icon */
    }
    .th-icon { color: rgba(255,255,255,0.7); cursor: pointer; display: flex; align-items: center; }

    /* ─── SCROLLABLE BODY ─── */
    .scroll-body {
      flex: 1 1 auto; overflow-y: auto; overflow-x: hidden;
      padding: 20px 16px;
      scrollbar-width: none;
    }
    .scroll-body::-webkit-scrollbar { display: none; }

    /* ─── MENU ITEMS (Screen 1) ─── */
    .menu-title {
      font-size: 22px; font-weight: 800; color: var(--text);
      letter-spacing: -0.02em; margin-bottom: 24px; line-height: 1.2;
    }

    .menu-item {
      background: var(--card); border-radius: 16px;
      padding: 16px; margin-bottom: 12px;
      display: flex; align-items: center; gap: 16px;
      cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      border: 1.5px solid transparent;
      transition: all 0.15s;
    }
    .menu-item:active { transform: scale(0.98); border-color: var(--border); }
    
    .mi-icon-wrap {
      width: 46px; height: 46px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .mi-icon-wrap.green { background: var(--green-light); }
    .mi-icon-wrap.purple { background: var(--purple-light); }
    .mi-icon-wrap.orange { background: var(--orange-light); }
    .mi-icon-wrap.blue { background: var(--transfer-light); }
    .mi-icon-wrap.grey { background: var(--grey-light); }

    .mi-text { flex: 1; }
    .mi-title { font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 2px; }
    .mi-desc { font-size: 12px; font-weight: 500; color: var(--muted); line-height: 1.3; }

    .mi-arrow { color: #c0cac0; display: flex; align-items: center; }

    /* ─── DYNAMIC FORMS ─── */
    .form-card {
      background: var(--card); border-radius: 16px;
      padding: 16px; margin-bottom: 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.02);
      border: 1px solid #f1f5f9;
    }

    .form-group { margin-bottom: 16px; position: relative; }
    .form-group:last-child { margin-bottom: 0; }
    .form-lbl { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 6px; display: block; }
    
    .form-control {
      width: 100%; height: 48px;
      border: 1.5px solid var(--border); border-radius: 12px;
      padding: 0 14px;
      font-family: inherit; font-size: 15px; font-weight: 600;
      color: var(--text); background: #fafcfa;
      outline: none; transition: border-color 0.2s;
    }
    .form-control:focus { border-color: var(--green-mid); background: #fff; }
    .form-control:disabled { background: #f0f4f0; color: #a0b0a0; opacity: 1; -webkit-text-fill-color: #a0b0a0; }

    .form-select {
      appearance: none; cursor: pointer;
      background-image: url("data:image/svg+xml,%3Csvg width='14' height='14' viewBox='0 0 24 24' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M6 9l6 6 6-6' stroke='%238898aa' stroke-width='2.5' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
      background-repeat: no-repeat;
      background-position: right 14px center;
    }

    /* Qty Input with Unit Select */
    .qty-group { display: flex; gap: 8px; }
    .qty-input { flex: 2; }
    .unit-select { flex: 1; }

    .form-checkbox-row {
      display: flex; align-items: center; gap: 10px; margin-top: 10px; cursor: pointer;
    }
    .fc-box {
      width: 22px; height: 22px; border-radius: 6px;
      border: 2px solid var(--green-mid);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s;
    }
    .fc-box.checked { background: var(--green-mid); }
    .fc-box svg { opacity: 0; transition: opacity 0.2s; }
    .fc-box.checked svg { opacity: 1; }
    .fc-lbl { font-size: 14px; font-weight: 600; color: var(--text); }

    /* ─── BOTTOM BUTTON WRAP ─── */
    .bottom-btn-wrap {
      flex: 0 0 auto; padding: 16px; background: var(--bg); border-top: 1px solid var(--border);
    }
    .primary-btn {
      width: 100%; height: 52px; border-radius: 26px; border: none;
      background: var(--green-mid); color: #fff;
      font-size: 16px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: opacity 0.2s;
      box-shadow: 0 8px 20px rgba(27,114,57,0.25);
    }
    .primary-btn:active { opacity: 0.85; }

    /* ─── CONFIRMATION SCREEN ─── */
    .conf-panel {
      background: #fff; text-align: center;
    }
    .conf-icon {
      width: 64px; height: 64px; border-radius: 50%;
      background: var(--green-mid);
      display: flex; align-items: center; justify-content: center;
      margin: 30px auto 16px;
    }
    .conf-title { font-size: 20px; font-weight: 800; color: var(--text); margin-bottom: 24px; line-height: 1.3; }

    .conf-summary {
      background: var(--bg); border-radius: 16px;
      padding: 16px; text-align: left; margin-bottom: 24px;
      border: 1px solid #dde8dd;
    }
    .conf-summary-title { font-size: 14px; font-weight: 700; color: var(--text); margin-bottom: 12px; }
    .cs-row { display: flex; justify-content: space-between; margin-bottom: 8px; }
    .cs-row:last-child { margin-bottom: 0; }
    .cs-lbl { font-size: 12px; font-weight: 600; color: var(--muted); }
    .cs-val { font-size: 13px; font-weight: 700; color: var(--text); text-align: right; }
    .cs-pill { background: #e4f4e4; color: var(--green-mid); padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: 800; display: inline-block; margin-left: 6px; vertical-align: middle; }

    .conf-checklist { text-align: left; margin-bottom: 30px; }
    .cc-item { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
    .cc-icon {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--green-light); color: var(--green-mid);
      display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    }
    .cc-text { font-size: 13px; font-weight: 600; color: var(--text); }

    .btn-outline {
      width: 100%; height: 52px; border-radius: 26px; border: 2px solid var(--border);
      background: transparent; color: var(--text);
      font-size: 15px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: background 0.2s; margin-top: 12px;
    }
    .btn-outline:active { background: var(--bg); }

    @media (max-width: 767px) {
      .viewport { padding: 0; }
      .screen { width: 390px; height: 844px; border-radius: 0; box-shadow: none; }
    }
  </style>

<script src="design-export.js"></script>
</head>

  let isInvoiceChecked = true;

  function toggleInvoice(el) {
    const box = el.querySelector('.fc-box');
    if (box.classList.contains('checked')) {
      box.classList.remove('checked');
      isInvoiceChecked = false;
    } else {
      box.classList.add('checked');
      isInvoiceChecked = true;
    }
  }

  function openForm(type, title) {
    currentFormType = type;
    document.getElementById('form-title').innerText = title;
    
    // Set button text based on type
    let btnText = "Record Movement";
    if(type === 'sale') btnText = "Record Sale";
    if(type === 'contract') btnText = "Record Delivery";
    if(type === 'internal') btnText = "Record Use";
    if(type === 'transfer') btnText = "Record Transfer";
    document.getElementById('submit-btn').innerText = btnText;

    // Load form HTML
    document.getElementById('form-body').innerHTML = forms[type];

    // Transition
    document.getElementById('p-menu').classList.add('exit-left');
    document.getElementById('p-form').classList.add('active');
    
    // Reset invoice state
    isInvoiceChecked = true;
  }

  function closeForm() {
    document.getElementById('p-form').classList.remove('active');
    document.getElementById('p-menu').classList.remove('exit-left');
  }

  function submitForm() {
    // Generate summary based on type
    let title = "";
    let summaryHtml = "";
    let checklistHtml = "";

    const checkIcon = `<div class="cc-icon"><svg width="12" height="12" viewBox="0 0 24 24" fill="none"><path d="M20 6L9 17l-5-5" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>`;

    if(currentFormType === 'sale') {
      title = "Sale recorded<br>successfully";
      summaryHtml = `
        <div class="cs-row"><div class="cs-lbl">Customer</div><div class="cs-val">ABC Feedlot</div></div>
        <div class="cs-row"><div class="cs-lbl">Commodity</div><div class="cs-val">Oaten Hay</div></div>
        <div class="cs-row"><div class="cs-lbl">Quantity</div><div class="cs-val">6.0 Tonne</div></div>
        <div class="cs-row"><div class="cs-lbl">Location</div><div class="cs-val">Hay Shed North - Bay 3</div></div>
        <div class="cs-row"><div class="cs-lbl">Date</div><div class="cs-val">8 May 2025</div></div>
      `;
      if(isInvoiceChecked) {
        summaryHtml += `<div class="cs-row"><div class="cs-lbl">Invoice</div><div class="cs-val">INV-1056 <span class="cs-pill">Generated</span></div></div>`;
      }
      
      checklistHtml = `
        <div class="cc-item">${checkIcon}<div class="cc-text">Inventory updated</div></div>
        <div class="cc-item">${checkIcon}<div class="cc-text">Customer updated</div></div>
      `;
      if(isInvoiceChecked) {
        checklistHtml += `<div class="cc-item">${checkIcon}<div class="cc-text">Invoice generated</div></div>`;
      }
    } 
    else if(currentFormType === 'contract') {
      title = "Contract delivery<br>recorded successfully";
      summaryHtml = `
        <div class="cs-row"><div class="cs-lbl">Contract</div><div class="cs-val">Contract #1234</div></div>
        <div class="cs-row"><div class="cs-lbl">Customer</div><div class="cs-val">ABC Feedlot</div></div>
        <div class="cs-row"><div class="cs-lbl">Commodity</div><div class="cs-val">Oaten Hay</div></div>
        <div class="cs-row"><div class="cs-lbl">Delivered</div><div class="cs-val">6.0 Tonne</div></div>
        <div class="cs-row"><div class="cs-lbl">Date</div><div class="cs-val">8 May 2025</div></div>
      `;
      checklistHtml = `
        <div class="cc-item">${checkIcon}<div class="cc-text">Inventory updated</div></div>
        <div class="cc-item">${checkIcon}<div class="cc-text">Contract balance updated</div></div>
      `;
    }
    else if(currentFormType === 'internal') {
      title = "Internal use<br>recorded successfully";
      summaryHtml = `
        <div class="cs-row"><div class="cs-lbl">Commodity</div><div class="cs-val">Oaten Hay</div></div>
        <div class="cs-row"><div class="cs-lbl">Quantity</div><div class="cs-val">2.5 Tonne</div></div>
        <div class="cs-row"><div class="cs-lbl">Used For</div><div class="cs-val">Sheep Enterprise</div></div>
        <div class="cs-row"><div class="cs-lbl">Location</div><div class="cs-val">Hay Shed North</div></div>
        <div class="cs-row"><div class="cs-lbl">Date</div><div class="cs-val">8 May 2025</div></div>
      `;
      checklistHtml = `
        <div class="cc-item">${checkIcon}<div class="cc-text">Inventory updated</div></div>
        <div class="cc-item">${checkIcon}<div class="cc-text">Enterprise records updated</div></div>
      `;
    }
    else if(currentFormType === 'transfer') {
      title = "Transfer recorded<br>successfully";
      summaryHtml = `
        <div class="cs-row"><div class="cs-lbl">Commodity</div><div class="cs-val">Oaten Hay</div></div>
        <div class="cs-row"><div class="cs-lbl">Quantity</div><div class="cs-val">6.0 Tonne</div></div>
        <div class="cs-row"><div class="cs-lbl">From</div><div class="cs-val">Hay Shed North - Bay 3</div></div>
        <div class="cs-row"><div class="cs-lbl">To</div><div class="cs-val">Hay Shed South - Bay 1</div></div>
        <div class="cs-row"><div class="cs-lbl">Date</div><div class="cs-val">8 May 2025</div></div>
      `;
      checklistHtml = `
        <div class="cc-item">${checkIcon}<div class="cc-text">Source inventory updated</div></div>
        <div class="cc-item">${checkIcon}<div class="cc-text">Destination inventory updated</div></div>
      `;
    }
    else {
      title = "Movement recorded<br>successfully";
      summaryHtml = `
        <div class="cs-row"><div class="cs-lbl">Commodity</div><div class="cs-val">Wheat</div></div>
        <div class="cs-row"><div class="cs-lbl">Quantity</div><div class="cs-val">1.0 Tonne</div></div>
        <div class="cs-row"><div class="cs-lbl">Type</div><div class="cs-val">Stocktake Adjustment</div></div>
        <div class="cs-row"><div class="cs-lbl">Location</div><div class="cs-val">Silo 1</div></div>
        <div class="cs-row"><div class="cs-lbl">Date</div><div class="cs-val">8 May 2025</div></div>
      `;
      checklistHtml = `
        <div class="cc-item">${checkIcon}<div class="cc-text">Inventory updated</div></div>
      `;
    }

    document.getElementById('conf-title').innerHTML = title;
    document.getElementById('conf-summary-content').innerHTML = summaryHtml;
    document.getElementById('conf-checklist').innerHTML = checklistHtml;

    // Transition to confirmation panel
    document.getElementById('p-form').classList.add('exit-left');
    document.getElementById('p-conf').classList.add('active');
  }
</script>
