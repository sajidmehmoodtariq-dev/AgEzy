<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Notifications – AgEzy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green-dark:#1a3d28;--green-mid:#1b7239;--green:#00ab4f;
  --orange:#f5a623;--red:#d63031;--blue:#2d5bd4;--purple:#7c3aed;
  --text:#1a2a3a;--muted:#8898aa;--border:#eaeef2;--bg:#f4f6f4;--card:#fff;
  --app-scale:1;
}
html,body{width:100%;height:100%;background:#e0e0e0;display:flex;align-items:center;justify-content:center}
.screen{
  width:390px;height:844px;background:var(--bg);border-radius:40px;
  overflow:hidden;position:relative;display:flex;flex-direction:column;
  transform:scale(var(--app-scale));transform-origin:center;
  box-shadow:0 28px 80px rgba(0,0,0,.22);
}

/* Header */
.hdr{background:var(--green-dark);padding:52px 20px 0;flex-shrink:0}
.hdr-row{display:flex;align-items:center;gap:12px;padding-bottom:14px}
.hdr-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-title{color:#fff;font:700 18px/1 system-ui;flex:1}
.hdr-action{background:rgba(255,255,255,.15);border:none;border-radius:20px;padding:6px 12px;color:rgba(255,255,255,.85);font:600 12px system-ui;cursor:pointer;white-space:nowrap}

/* Filter tabs */
.ftabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:14px}
.ftabs::-webkit-scrollbar{display:none}
.ftab{padding:7px 15px;border-radius:20px;border:1.5px solid rgba(255,255,255,.22);background:transparent;font:500 12px system-ui;color:rgba(255,255,255,.7);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.ftab.active{border-color:#fff;color:#fff;background:rgba(255,255,255,.2)}

/* Body */
.body{flex:1;overflow-y:auto;padding:0 0 100px}
.body::-webkit-scrollbar{display:none}

/* Date group label */
.group-label{font:700 11px system-ui;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;padding:16px 20px 6px}

/* Notification card */
.notif-card{display:flex;align-items:flex-start;gap:12px;padding:14px 20px;background:#fff;border-bottom:1px solid var(--border);cursor:pointer;transition:background .12s;position:relative}
.notif-card:active{background:#f8faf8}
.notif-card.unread{background:#fff}
.notif-card.unread::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--green);border-radius:0 2px 2px 0}
.notif-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.notif-icon.green{background:#ddf5e8}
.notif-icon.blue{background:#e4eaf8}
.notif-icon.red{background:#fde4e4}
.notif-icon.orange{background:#fff3e0}
.notif-icon.purple{background:#f3e8ff}
.notif-body{flex:1;min-width:0}
.notif-title{font:600 13.5px system-ui;color:var(--text);line-height:1.3}
.notif-title strong{font-weight:700}
.notif-sub{font:400 12px system-ui;color:var(--muted);margin-top:3px;line-height:1.4}
.notif-meta{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0}
.notif-time{font:400 11px system-ui;color:var(--muted);white-space:nowrap}
.unread-dot{width:8px;height:8px;border-radius:50%;background:var(--green)}

/* Empty state */
.empty{text-align:center;padding:60px 20px}
.empty-icon{width:64px;height:64px;border-radius:50%;background:#f0f4f0;display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty-title{font:700 16px system-ui;color:var(--text);margin-bottom:6px}
.empty-sub{font:400 13px system-ui;color:var(--muted)}

/* Bottom nav */
.nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;padding:8px 0 20px;z-index:10}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none}
.nav-ic{width:40px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.nav-ic.active{background:var(--green-dark)}
.nav-lbl{font:500 10px system-ui;color:var(--muted)}
.nav-item.active .nav-lbl{color:var(--green-dark);font-weight:700}

/* Backdrop + Sheet */
.backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
.backdrop.show{opacity:1;pointer-events:all}
.sheet{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:24px 24px 0 0;z-index:51;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:80%}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0}
.sheet-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 10px}
.sheet-title{font:700 16px system-ui;color:var(--text)}
.sheet-close{width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-body{padding:0 20px 28px;overflow-y:auto;max-height:65vh}
.sheet-body::-webkit-scrollbar{display:none}
.det-icon-wrap{width:60px;height:60px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:4px auto 14px}
.det-title{text-align:center;font:700 16px system-ui;color:var(--text);margin-bottom:6px}
.det-sub{text-align:center;font:400 13px/1.5 system-ui;color:var(--muted);margin-bottom:16px}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--border)}
.det-row:last-of-type{border-bottom:none}
.det-lbl{font:400 12px system-ui;color:var(--muted)}
.det-val{font:600 12px system-ui;color:var(--text)}
.btn-primary{width:100%;padding:15px;border-radius:14px;background:var(--green);border:none;color:#fff;font:700 15px system-ui;cursor:pointer;margin-top:14px}
.btn-ghost{width:100%;padding:13px;border-radius:14px;background:#fff;border:1.5px solid var(--border);color:var(--text);font:600 14px system-ui;cursor:pointer;margin-top:8px}
.badge{padding:3px 9px;border-radius:20px;font:600 11px system-ui;display:inline-block;margin-bottom:14px}
.badge-green{background:#e8f7ed;color:var(--green-mid)}
.badge-orange{background:#fff3e0;color:#c47a00}
.badge-red{background:#fdeef0;color:var(--red)}
.badge-blue{background:#e8f3ff;color:var(--blue)}
.badge-purple{background:#f3e8ff;color:var(--purple)}

/* Toast */
.toast{position:absolute;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(26,61,40,.95);color:#fff;padding:10px 20px;border-radius:24px;font:500 13px system-ui;white-space:nowrap;opacity:0;transition:all .3s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

let currentTab = 'all';

function setTab(el, tab) {
  document.querySelectorAll('.ftab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  currentTab = tab;
  render();
}

function render() {
  const body = document.getElementById('notifBody');
  const filtered = notifications.filter(n => {
    if (currentTab === 'unread') return n.unread;
    if (currentTab === 'all') return true;
    return n.cat === currentTab;
  });

  if (!filtered.length) {
    body.innerHTML = `<div class="empty"><div class="empty-icon"><svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="1.5"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0" stroke-linecap="round"/></svg></div><div class="empty-title">All caught up!</div><div class="empty-sub">No notifications in this category.</div></div>`;
    return;
  }

  const groups = [...new Set(filtered.map(n => n.group))];
  body.innerHTML = groups.map(g => `
    <div class="group-label">${g}</div>
    ${filtered.filter(n => n.group === g).map(n => `
      <div class="notif-card${n.unread ? ' unread' : ''}" onclick="openDetail('${n.id}')">
        <div class="notif-icon ${n.color}" style="color:${colorMap[n.color]}">${icons[n.icon]||''}</div>
        <div class="notif-body">
          <div class="notif-title">${n.title}</div>
          <div class="notif-sub">${n.sub}</div>
        </div>
        <div class="notif-meta">
          <span class="notif-time">${n.time}</span>
          ${n.unread ? '<div class="unread-dot"></div>' : ''}
        </div>
      </div>
    `).join('')}
  `).join('');

  // Update unread count chip
  const unread = notifications.filter(n => n.unread).length;
  document.getElementById('unreadCount').textContent = unread;
  document.getElementById('unreadCount').style.display = unread ? '' : 'none';
}

function openDetail(id) {
  const n = notifications.find(x => x.id === id);
  if (!n) return;

  // Mark as read
  n.unread = false;
  render();

  const rows = Object.entries(n.details).map(([k,v]) => `
    <div class="det-row"><span class="det-lbl">${k}</span><span class="det-val">${v}</span></div>
  `).join('');

  document.getElementById('detBody').innerHTML = `
    <div class="det-icon-wrap" style="background:${bgMap[n.color]};color:${colorMap[n.color]}">${icons[n.icon]||''}</div>
    <div class="det-title">${n.title.replace(/<[^>]+>/g,'')}</div>
    <div class="det-sub">${n.sub}</div>
    <span class="badge ${n.badgeClass}" style="display:block;text-align:center">${n.badge}</span>
    ${rows}
    <button class="btn-primary" onclick="goTo('${n.dest}')">${n.destLabel} →</button>
    <button class="btn-ghost" onclick="deleteNotif('${n.id}')">Dismiss Notification</button>
  `;
  document.getElementById('detBackdrop').classList.add('show');
  requestAnimationFrame(() => document.getElementById('detSheet').classList.add('open'));
}

function closeSheet() {
  document.getElementById('detSheet').classList.remove('open');
  setTimeout(() => document.getElementById('detBackdrop').classList.remove('show'), 300);
}

function goTo(url) {
  closeSheet();
  setTimeout(() => window.location.href = url, 200);
}

function deleteNotif(id) {
  notifications = notifications.filter(n => n.id !== id);
  closeSheet();
  render();
  showToast('Notification dismissed');
}

function markAllRead() {
  notifications.forEach(n => n.unread = false);
  render();
  showToast('All notifications marked as read');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

function resize() {
  const s = Math.min((innerWidth - 24) / 390, (innerHeight - 24) / 844, 1);
  document.documentElement.style.setProperty('--app-scale', s);
}
window.addEventListener('resize', resize); resize();
