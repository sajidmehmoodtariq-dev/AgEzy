<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AgEzy – Contracting Hub</title>
  <style>
    :root {
      --green-dark: #1a3d28; --green-mid: #1b7239; --green: #00ab4f;
      --orange: #f5a623; --red: #d63031; --blue: #2d5bd4;
      --text: #1a2a3a; --muted: #8898aa; --border: #eaeef2;
      --bg: #f4f6f4; --card: #fff;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html,body { width:100%; height:100%; background:#e0e0e0; font-family:"Segoe UI",system-ui,sans-serif; overflow:hidden; }
    .viewport { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; padding:16px; }
    .screen { width:390px; height:844px; transform:scale(var(--app-scale,1)); transform-origin:center; background:var(--bg); border-radius:26px; overflow:hidden; box-shadow:0 28px 80px rgba(0,0,0,.22); display:flex; flex-direction:column; }

    /* HEADER */
    .header { flex:0 0 auto; background:var(--green-dark); padding:14px 16px 12px; display:flex; align-items:center; gap:10px; }
    .h-title { flex:1; font-size:20px; font-weight:800; color:#fff; letter-spacing:-.03em; }
    .h-btn { width:34px; height:34px; border-radius:50%; background:rgba(255,255,255,.12); display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; border:none; font-size:20px; }

    /* CALENDAR STRIP */
    .cal-strip { flex:0 0 auto; background:var(--green-dark); padding:0 14px 14px; }
    .cal-month { font-size:11px; color:rgba(255,255,255,.5); font-weight:700; letter-spacing:.08em; text-transform:uppercase; margin-bottom:8px; }
    .cal-days { display:flex; gap:4px; }
    .cal-day { flex:1; display:flex; flex-direction:column; align-items:center; gap:3px; padding:6px 0; border-radius:12px; cursor:pointer; transition:background .15s; }
    .cal-day.active { background:rgba(255,255,255,.15); }
    .cal-day:active { background:rgba(255,255,255,.2); }
    .cal-day-lbl { font-size:9px; font-weight:700; color:rgba(255,255,255,.45); text-transform:uppercase; }
    .cal-day-num { font-size:16px; font-weight:800; color:#fff; line-height:1; }
    .cal-day.active .cal-day-num { color:#fff; }
    .cal-dot { width:5px; height:5px; border-radius:50%; background:var(--green); }

    /* FILTER TABS */
    .filter-tabs { flex:0 0 auto; background:var(--card); border-bottom:1px solid var(--border); display:flex; }
    .ftab { flex:1; padding:11px 0 9px; font-size:12px; font-weight:700; color:var(--muted); text-align:center; cursor:pointer; border-bottom:2.5px solid transparent; transition:all .15s; white-space:nowrap; }
    .ftab.active { color:var(--green-mid); border-color:var(--green-mid); }

    /* BODY */
    .body { flex:1 1 auto; overflow-y:auto; padding:12px 14px 4px; scrollbar-width:none; }
    .body::-webkit-scrollbar { display:none; }

    .section-lbl { font-size:10px; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.1em; margin:8px 0 8px; }

    /* JOB CARD */
    .job-card { background:var(--card); border-radius:16px; padding:14px; margin-bottom:10px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,.05); transition:transform .12s; position:relative; overflow:hidden; }
    .job-card:active { transform:scale(.985); }
    .job-card-bar { position:absolute; left:0; top:0; bottom:0; width:4px; border-radius:0; }
    .job-card-bar.scheduled  { background:var(--blue); }
    .job-card-bar.in-progress { background:var(--orange); }
    .job-card-bar.completed  { background:var(--green-mid); }

    .jc-top { display:flex; align-items:flex-start; gap:10px; padding-left:10px; margin-bottom:8px; }
    .jc-info { flex:1; }
    .jc-status { font-size:9px; font-weight:800; letter-spacing:.07em; text-transform:uppercase; margin-bottom:4px; }
    .jc-status.scheduled  { color:var(--blue); }
    .jc-status.in-progress { color:var(--orange); }
    .jc-status.completed  { color:var(--green-mid); }
    .jc-title { font-size:15px; font-weight:800; color:var(--text); margin-bottom:2px; }
    .jc-loc   { font-size:12px; color:var(--muted); font-weight:500; }
    .jc-time  { font-size:12px; font-weight:700; color:var(--muted); text-align:right; }

    .jc-bottom { display:flex; align-items:center; gap:8px; padding-left:10px; }
    .jc-avatar { width:26px; height:26px; border-radius:50%; background:#d6f0e0; display:flex; align-items:center; justify-content:center; font-size:9px; font-weight:800; color:var(--green-mid); flex:0 0 26px; }
    .jc-operator { font-size:12px; font-weight:600; color:var(--text); }
    .jc-tag { margin-left:auto; padding:3px 10px; border-radius:12px; font-size:10px; font-weight:700; }
    .jc-tag.green { background:#e4f8ee; color:var(--green-mid); }
    .jc-tag.blue  { background:#e4ecfd; color:var(--blue); }
    .jc-tag.gray  { background:#f0f4f0; color:var(--muted); }

    /* FAB */
    .fab { position:absolute; bottom:78px; right:18px; width:50px; height:50px; border-radius:25px; background:var(--green-mid); box-shadow:0 6px 18px rgba(27,114,57,.35); display:flex; align-items:center; justify-content:center; cursor:pointer; color:#fff; font-size:26px; border:none; z-index:10; transition:transform .15s; }
    .fab:active { transform:scale(.92); }

    /* EMPTY STATE */
    .empty { display:none; flex-direction:column; align-items:center; justify-content:center; padding:40px 20px; gap:8px; text-align:center; }
    .empty.show { display:flex; }
    .empty-title { font-size:15px; font-weight:700; color:var(--text); }
    .empty-sub   { font-size:13px; color:var(--muted); }

    /* BOTTOM NAV */
    .bottom-nav { flex:0 0 auto; height:70px; background:#fff; border-top:1px solid #e8ede8; display:flex; align-items:center; padding:0 10px; }
    .nav-item { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; cursor:pointer; padding:4px; }
    .nav-ic { width:40px; height:40px; border-radius:50%; display:flex; align-items:center; justify-content:center; }
    .nav-ic.active { background:var(--green-dark); }
    .nav-lbl { font-size:10px; font-weight:600; color:var(--muted); }
    .nav-lbl.active { color:var(--green-dark); }

    @media (max-width:767px) { .viewport{padding:0} .screen{width:390px;height:844px;border-radius:0;box-shadow:none} }
  </style>
</head>
<body>
<div class="viewport"><main class="screen">

  <!-- HEADER -->
  <header class="header">
    <div class="h-title">Contracting</div>
    <button class="h-btn" id="calBtn" title="Calendar">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="17" rx="2" stroke="#fff" stroke-width="2"/><path d="M16 2v4M8 2v4M3 9h18" stroke="#fff" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
    <button class="h-btn" onclick="window.location.href='create-job.html'" title="Add job" style="font-size:22px;font-weight:300">+</button>
  </header>

  <!-- CALENDAR STRIP -->
  <div class="cal-strip">
    <div class="cal-month">October 2023</div>
    <div class="cal-days" id="calDays">
      <div class="cal-day" data-date="23"><div class="cal-day-lbl">Mon</div><div class="cal-day-num">23</div><div style="height:5px"></div></div>
      <div class="cal-day active" data-date="24"><div class="cal-day-lbl">Tue</div><div class="cal-day-num">24</div><div class="cal-dot"></div></div>
      <div class="cal-day" data-date="25"><div class="cal-day-lbl">Wed</div><div class="cal-day-num">25</div><div style="height:5px"></div></div>
      <div class="cal-day" data-date="26"><div class="cal-day-lbl">Thu</div><div class="cal-day-num">26</div><div style="height:5px"></div></div>
      <div class="cal-day" data-date="27"><div class="cal-day-lbl">Fri</div><div class="cal-day-num">27</div><div class="cal-dot"></div></div>
      <div class="cal-day" data-date="28"><div class="cal-day-lbl">Sat</div><div class="cal-day-num">28</div><div style="height:5px"></div></div>
    </div>
  </div>

  <!-- FILTER TABS -->
  <div class="filter-tabs">
    <div class="ftab active" data-f="all">All</div>
    <div class="ftab" data-f="scheduled">Scheduled</div>
    <div class="ftab" data-f="in-progress">In Progress</div>
    <div class="ftab" data-f="completed">Completed</div>
  </div>

  <!-- JOB LIST -->
  <div class="body" id="jobList">
    <div class="empty" id="emptyState">
      <div style="width:52px;height:52px;background:#eef2ee;border-radius:50%;display:flex;align-items:center;justify-content:center">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><rect x="3" y="4" width="18" height="17" rx="2" stroke="#8898aa" stroke-width="2"/><path d="M16 2v4M8 2v4M3 9h18" stroke="#8898aa" stroke-width="2" stroke-linecap="round"/></svg>
      </div>
      <div class="empty-title">No jobs found</div>
      <div class="empty-sub">Try a different filter or add a new job</div>
    </div>
  </div>

  <button class="fab" onclick="window.location.href='create-job.html'">+</button>

  <!-- BOTTOM NAV -->
  <nav class="bottom-nav">
    <div class="nav-item" onclick="window.location.href='dashboard.html'">
      <div class="nav-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 12L12 4l9 8" stroke="#8898aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-5h4v5h4a1 1 0 0 0 1-1v-9" stroke="#8898aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
      <div class="nav-lbl">Home</div>
    </div>
    <div class="nav-item">
      <div class="nav-ic active"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="2" y="7" width="20" height="14" rx="2" stroke="#fff" stroke-width="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2" stroke="#fff" stroke-width="2" stroke-linecap="round"/><path d="M12 12v4M10 14h4" stroke="#fff" stroke-width="1.8" stroke-linecap="round"/></svg></div>
      <div class="nav-lbl active">Contracting</div>
    </div>
    <div class="nav-item" onclick="window.location.href='timesheets-list.html'">
      <div class="nav-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z" stroke="#8898aa" stroke-width="2" stroke-linejoin="round"/><path d="M14 2v6h6M16 13H8M16 17H8M10 9H8" stroke="#8898aa" stroke-width="1.8" stroke-linecap="round"/></svg></div>
      <div class="nav-lbl">Timesheets</div>
    </div>
    <div class="nav-item">
      <div class="nav-ic"><svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="3" stroke="#8898aa" stroke-width="2"/><path d="M12 2v2M12 20v2M2 12h2M20 12h2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41" stroke="#8898aa" stroke-width="2" stroke-linecap="round"/></svg></div>
      <div class="nav-lbl">Settings</div>
    </div>
  </nav>

</main></div>
<script>
  const baseW=390,baseH=844,pad=32;
  const scale=()=>{ const s=Math.min((innerWidth-pad)/baseW,(innerHeight-pad)/baseH,1); document.documentElement.style.setProperty('--app-scale',s.toFixed(4)); };
  scale(); addEventListener('resize',scale);

  const jobs = [
    { id:'JOB-2025-089', title:'Hay Cutting',   type:'hay',     status:'scheduled',   date:'Oct 24', time:'07:30 AM', loc:'Green Acres Farm',               op:'John G.',   opInit:'JG', tag:'Big Rid',    tagClass:'blue' },
    { id:'JOB-2025-088', title:'Crop Spraying',  type:'spray',   status:'in-progress', date:'Oct 24', time:'09:00 AM', loc:'Valley View Station',             op:'Sarah M.',  opInit:'SM', tag:'This Season',tagClass:'green' },
    { id:'JOB-2025-087', title:'Wheat Harvest',  type:'harvest', status:'scheduled',   date:'Oct 24', time:'06:00 AM', loc:'Top Hill, 95ha',                  op:'Miles F.',  opInit:'MF', tag:'Home',       tagClass:'gray' },
    { id:'JOB-2025-086', title:'Hay Baling',     type:'hay',     status:'completed',   date:'Oct 23', time:'06:30 AM', loc:'Highfield Organic',               op:'James R.',  opInit:'JR', tag:'Spring',     tagClass:'green' },
    { id:'JOB-2025-085', title:'Canola Spray',   type:'spray',   status:'completed',   date:'Oct 22', time:'08:00 AM', loc:'North Paddock #4',                op:'Emma W.',   opInit:'EW', tag:'Season',     tagClass:'blue' },
    { id:'JOB-2025-084', title:'Grain Harvest',  type:'harvest', status:'in-progress', date:'Oct 27', time:'05:30 AM', loc:'Block C, South Station',          op:'Alex P.',   opInit:'AP', tag:'Harvest',    tagClass:'green' },
  ];

  let activeFilter = 'all';
  let activeDate   = '24';

  const statusLabel = { 'scheduled':'Scheduled','in-progress':'In Progress','completed':'Completed' };

  function render() {
    const list = document.getElementById('jobList');
    list.querySelectorAll('.job-card,.section-lbl').forEach(el=>el.remove());
    const empty = document.getElementById('emptyState');

    let filtered = jobs.filter(j => {
      if (activeFilter !== 'all' && j.status !== activeFilter) return false;
      return true;
    });

    if (!filtered.length) { empty.classList.add('show'); return; }
    empty.classList.remove('show');

    filtered.forEach(j => {
      const card = document.createElement('div');
      card.className = 'job-card';
      card.innerHTML = `
        <div class="job-card-bar ${j.status}"></div>
        <div class="jc-top">
          <div class="jc-info">
            <div class="jc-status ${j.status}">${statusLabel[j.status]}</div>
            <div class="jc-title">${j.title}</div>
            <div class="jc-loc">${j.loc}</div>
          </div>
          <div class="jc-time">${j.date}<br><span style="font-weight:500;font-size:11px">${j.time}</span></div>
        </div>
        <div class="jc-bottom">
          <div class="jc-avatar">${j.opInit}</div>
          <div class="jc-operator">${j.op}</div>
          <div class="jc-tag ${j.tagClass}">${j.tag}</div>
        </div>`;
      card.addEventListener('click', () => {
        sessionStorage.setItem('jobType', j.type);
        sessionStorage.setItem('jobId',   j.id);
        sessionStorage.setItem('jobTitle',j.title);
        sessionStorage.setItem('jobStatus',j.status);
        window.location.href = 'job-detail.html';
      });
      list.appendChild(card);
    });
  }

  // Filter tabs
  document.querySelectorAll('.ftab').forEach(t => {
    t.addEventListener('click', () => {
      document.querySelectorAll('.ftab').forEach(x=>x.classList.remove('active'));
      t.classList.add('active');
      activeFilter = t.dataset.f;
      render();
    });
  });

  // Calendar days
  document.querySelectorAll('.cal-day').forEach(d => {
    d.addEventListener('click', () => {
      document.querySelectorAll('.cal-day').forEach(x=>x.classList.remove('active'));
      d.classList.add('active');
      activeDate = d.dataset.date;
    });
  });

  render();
</script>
</body></html>
