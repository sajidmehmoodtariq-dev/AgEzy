<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Recent Activity – AgEzy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green-dark:#1a3d28;--green-mid:#1b7239;--green:#00ab4f;
  --orange:#f5a623;--red:#d63031;--blue:#2d5bd4;--purple:#7c3aed;
  --text:#1a2a3a;--muted:#8898aa;--border:#eaeef2;--bg:#f4f6f4;--card:#fff;
  --app-scale:1;
}
html,body{width:100%;height:100%;background:#e0e0e0;display:flex;align-items:center;justify-content:center}
.screen{
  width:390px;height:844px;background:var(--bg);border-radius:40px;
  overflow:hidden;position:relative;display:flex;flex-direction:column;
  transform:scale(var(--app-scale));transform-origin:center;
  box-shadow:0 32px 80px rgba(0,0,0,.5);
}

/* Header */
.hdr{background:var(--green-dark);padding:52px 20px 0;flex-shrink:0}
.hdr-row{display:flex;align-items:center;gap:12px;padding-bottom:14px}
.hdr-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-title{color:#fff;font:700 18px/1 system-ui;flex:1}
.hdr-search-btn{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}

/* Search bar */
.search-wrap{overflow:hidden;max-height:0;transition:max-height .25s ease;padding:0 0}
.search-wrap.open{max-height:60px;padding:0 0 14px}
.search-inner{position:relative}
.search-input{width:100%;background:rgba(255,255,255,.12);border:1.5px solid rgba(255,255,255,.22);border-radius:12px;padding:10px 14px 10px 38px;color:#fff;font:400 14px system-ui;outline:none}
.search-input::placeholder{color:rgba(255,255,255,.5)}
.search-inner svg{position:absolute;left:11px;top:50%;transform:translateY(-50%);opacity:.6}

/* Filter tabs */
.ftabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:14px}
.ftabs::-webkit-scrollbar{display:none}
.ftab{padding:7px 15px;border-radius:20px;border:1.5px solid rgba(255,255,255,.22);background:transparent;font:500 12px system-ui;color:rgba(255,255,255,.7);cursor:pointer;white-space:nowrap;flex-shrink:0;transition:all .15s}
.ftab.active{border-color:#fff;color:#fff;background:rgba(255,255,255,.2)}

/* Stats strip */
.stats-strip{background:var(--green-mid);padding:10px 20px;display:flex;gap:0;flex-shrink:0}
.stat-item{flex:1;text-align:center;border-right:1px solid rgba(255,255,255,.18)}
.stat-item:last-child{border-right:none}
.stat-num{color:#fff;font:700 16px system-ui}
.stat-lbl{color:rgba(255,255,255,.65);font:400 10px system-ui;margin-top:1px}

/* Body */
.body{flex:1;overflow-y:auto;padding:16px 20px 100px}
.body::-webkit-scrollbar{display:none}

/* Date group */
.date-group{margin-bottom:6px}
.date-label{font:700 11px system-ui;color:var(--muted);text-transform:uppercase;letter-spacing:.6px;margin-bottom:8px;padding-left:2px}

/* Activity card */
.act-card{background:#fff;border-radius:16px;padding:13px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:transform .1s,box-shadow .1s}
.act-card:active{transform:scale(.98);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.act-icon{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.act-icon.green{background:#ddf5e8}
.act-icon.blue{background:#e4eaf8}
.act-icon.red{background:#fde4e4}
.act-icon.orange{background:#fff3e0}
.act-icon.purple{background:#f3e8ff}
.act-icon.teal{background:#e0f7f4}
.act-info{flex:1;min-width:0}
.act-name{font:600 13.5px system-ui;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.act-sub{font:400 11.5px system-ui;color:var(--muted);margin-top:2px}
.act-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.act-time{font:400 11px system-ui;color:var(--muted)}
.act-badge{padding:2px 8px;border-radius:20px;font:600 10px system-ui}
.badge-green{background:#e8f7ed;color:var(--green-mid)}
.badge-blue{background:#e8f3ff;color:var(--blue)}
.badge-red{background:#fdeef0;color:var(--red)}
.badge-orange{background:#fff3e0;color:#c47a00}
.badge-purple{background:#f3e8ff;color:var(--purple)}
.badge-gray{background:#f0f0f0;color:#555}
.act-chev{color:#ccc}

/* Bottom nav */
.nav{position:absolute;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);display:flex;padding:8px 0 20px;z-index:10}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;border:none;background:none}
.nav-ic{width:40px;height:28px;border-radius:14px;display:flex;align-items:center;justify-content:center}
.nav-ic.active{background:var(--green-dark)}
.nav-lbl{font:500 10px system-ui;color:var(--muted)}
.nav-item.active .nav-lbl{color:var(--green-dark);font-weight:700}

/* Backdrop + Sheet */
.backdrop{position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:50;opacity:0;pointer-events:none;transition:opacity .25s}
.backdrop.show{opacity:1;pointer-events:all}
.sheet{position:absolute;bottom:0;left:0;right:0;background:#fff;border-radius:24px 24px 0 0;z-index:51;transform:translateY(100%);transition:transform .3s cubic-bezier(.4,0,.2,1);max-height:80%}
.sheet.open{transform:translateY(0)}
.sheet-handle{width:36px;height:4px;background:#ddd;border-radius:2px;margin:12px auto 0}
.sheet-close{width:30px;height:30px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center}
.sheet-body{padding:0 20px 28px;overflow-y:auto;max-height:68vh}
.sheet-body::-webkit-scrollbar{display:none}

/* Detail sheet */
.det-icon-wrap{width:64px;height:64px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:8px auto 14px}
.det-title{text-align:center;font:700 17px system-ui;color:var(--text);margin-bottom:4px}
.det-time{text-align:center;font:400 12px system-ui;color:var(--muted);margin-bottom:16px}
.det-row{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--border)}
.det-row:last-of-type{border-bottom:none}
.det-lbl{font:400 13px system-ui;color:var(--muted)}
.det-val{font:600 13px system-ui;color:var(--text)}
.det-val.green{color:var(--green-mid)}
.det-val.red{color:var(--red)}
.det-val.orange{color:#c47a00}
.det-val.blue{color:var(--blue)}
.det-desc{background:var(--bg);border-radius:12px;padding:12px;font:400 13px/1.5 system-ui;color:var(--text);margin:12px 0}
.btn-primary{width:100%;padding:15px;border-radius:14px;background:var(--green);border:none;color:#fff;font:700 15px system-ui;cursor:pointer;margin-top:14px}
.btn-ghost{width:100%;padding:13px;border-radius:14px;background:#fff;border:1.5px solid var(--border);color:var(--text);font:600 14px system-ui;cursor:pointer;margin-top:8px}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(--muted)}
.empty svg{margin:0 auto 12px;display:block;opacity:.35}
.empty-title{font:700 15px system-ui;color:var(--text);margin-bottom:6px}
.empty-sub{font:400 13px system-ui;color:var(--muted)}

/* Toast */
.toast{position:absolute;bottom:100px;left:50%;transform:translateX(-50%) translateY(20px);background:rgba(26,61,40,.95);color:#fff;padding:10px 20px;border-radius:24px;font:500 13px system-ui;white-space:nowrap;opacity:0;transition:all .3s;z-index:200;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>

  const sw = document.getElementById('searchWrap');
  sw.classList.toggle('open');
  if (sw.classList.contains('open')) document.getElementById('searchInput').focus();
}

function filterAll(q) {
  currentQ = q.toLowerCase();
  render();
}

function render() {
  const body = document.getElementById('actBody');
  const filtered = activities.filter(a => {
    const matchTab = currentTab === 'all' || a.cat === currentTab;
    const matchQ = !currentQ || a.name.toLowerCase().includes(currentQ) || a.sub.toLowerCase().includes(currentQ);
    return matchTab && matchQ;
  });

  if (!filtered.length) {
    body.innerHTML = `<div class="empty"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="1.5"><circle cx="12" cy="12" r="9"/><path d="M12 8v4M12 16h.01" stroke-linecap="round"/></svg><div class="empty-title">No activity found</div><div class="empty-sub">Try a different filter or search term</div></div>`;
    return;
  }

  const groups = [...new Set(filtered.map(a => a.group))];
  body.innerHTML = groups.map(g => `
    <div class="date-group">
      <div class="date-label">${g}</div>
      ${filtered.filter(a=>a.group===g).map(a=>`
        <div class="act-card" onclick="openDetail('${a.id}')">
          <div class="act-icon ${a.icon}" style="color:${colorMap[a.icon]||'#555'}">${iconSvgs[a.iconSvg]||''}</div>
          <div class="act-info">
            <div class="act-name">${a.name}</div>
            <div class="act-sub">${a.sub}</div>
          </div>
          <div class="act-right">
            <div class="act-time">${a.time}</div>
            <span class="act-badge ${a.badgeClass}">${a.badge}</span>
          </div>
          <div class="act-chev"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="2.5"><path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        </div>
      `).join('')}
    </div>
  `).join('');
}

function openDetail(id) {
  const a = activities.find(x=>x.id===id);
  if (!a) return;
  const c = colorMap[a.icon]||'#555';
  const bgMap = {green:'#ddf5e8',blue:'#e4eaf8',red:'#fde4e4',orange:'#fff3e0',purple:'#f3e8ff',teal:'#e0f7f4'};
  const rows = Object.entries(a.details).filter(([k])=>k!=='Notes').map(([k,v])=>`
    <div class="det-row">
      <span class="det-lbl">${k}</span>
      <span class="det-val">${v}</span>
    </div>
  `).join('');
  const notes = a.details.Notes ? `<div class="det-desc">${a.details.Notes}</div>` : '';

  document.getElementById('detBody').innerHTML = `
    <div class="det-icon-wrap" style="background:${bgMap[a.icon]||'#f0f0f0'};color:${c}">${iconSvgs[a.iconSvg]||''}</div>
    <div class="det-title">${a.name}</div>
    <div class="det-time">${a.group} · ${a.time}</div>
    <span class="act-badge ${a.badgeClass}" style="display:block;text-align:center;margin-bottom:16px">${a.badge}</span>
    ${rows}
    ${notes}
    <button class="btn-primary" onclick="goTo('${a.dest}')">${a.destLabel} →</button>
    <button class="btn-ghost" onclick="closeSheet()">Close</button>
  `;
  document.getElementById('detBackdrop').classList.add('show');
  requestAnimationFrame(()=>document.getElementById('detSheet').classList.add('open'));
}

function closeSheet() {
  document.getElementById('detSheet').classList.remove('open');
  setTimeout(()=>document.getElementById('detBackdrop').classList.remove('show'), 300);
}

function goTo(url) {
  closeSheet();
  setTimeout(()=>window.location.href=url, 200);
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2400);
}

// Scale
function resize(){
  const s=Math.min((innerWidth-24)/390,(innerHeight-24)/844,1);
  document.documentElement.style.setProperty('--app-scale',s);
}
window.addEventListener('resize',resize); resize();

render();
</script>
</body>
</html>
