<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Silo Details – AgEzy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green-dark:#1a3d28;--green-mid:#1b7239;--green:#00ab4f;
  --orange:#f5a623;--red:#d63031;--blue:#2d5bd4;--purple:#7c3aed;
  --text:#1a2a3a;--muted:#8898aa;--border:#eaeef2;--bg:#f4f6f4;--card:#fff;
  --app-scale:1;
}
html,body{width:100%;height:100%;background:#e0e0e0;display:flex;align-items:center;justify-content:center}
.screen{
  width:390px;height:844px;background:var(--bg);border-radius:40px;
  overflow:hidden;position:relative;display:flex;flex-direction:column;
  transform:scale(var(--app-scale));transform-origin:center;
  box-shadow:0 32px 80px rgba(0,0,0,.5);
}
/* Header */
.hdr{background:var(--green-dark);padding:52px 20px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0}
.hdr-back{width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.15);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.hdr-title{color:#fff;font:700 18px/1 system-ui;flex:1}
.hdr-btn-icon{width:36px;height:36px;border-radius:50%;background:transparent;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* Body */
.body{flex:1;overflow-y:auto;padding:16px 20px 100px}
.body::-webkit-scrollbar{display:none}

/* Top Overview */
.overview-card{background:var(--card);border-radius:16px;padding:20px;margin-bottom:20px;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;align-items:center;gap:16px;}
.overview-icon{width:56px;height:56px;border-radius:12px;display:flex;align-items:center;justify-content:center;background:var(--bg);flex-shrink:0;}
.overview-icon svg{width:32px;height:32px;stroke:var(--muted);}
.overview-info{flex:1;}
.overview-title{font:700 20px system-ui;color:var(--text);margin-bottom:4px;}
.overview-subtitle{font:600 14px system-ui;color:var(--muted);}

/* Stats Block */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;}
.stat-box{background:var(--card);border-radius:16px;padding:20px;box-shadow:0 2px 8px rgba(0,0,0,.04);text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.stat-lbl{font:600 12px system-ui;color:var(--muted);margin-bottom:8px;text-transform:uppercase;letter-spacing:0.5px;}
.stat-val{font:700 20px system-ui;color:var(--green);}
.stat-val.dark{color:var(--text);}

/* Donut Chart (CSS simulation) */
.donut-wrap{width:70px;height:70px;border-radius:50%;background:conic-gradient(var(--green) 0% 33%, var(--border) 33% 100%);position:relative;display:flex;align-items:center;justify-content:center;margin-top:8px;}
.donut-inner{width:54px;height:54px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font:700 15px system-ui;color:var(--text);}

/* Section Label */
.sec-title{font:700 12px system-ui;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin:24px 0 12px;}

/* Location Card */
.loc-card{background:var(--card);border-radius:16px;padding:16px 20px;box-shadow:0 2px 8px rgba(0,0,0,.04);display:flex;align-items:center;gap:16px;cursor:pointer;border:2px solid transparent;}
.loc-card:active{background:#fafafa;}
.loc-icon{width:40px;height:40px;border-radius:10px;background:#e8f4fd;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.loc-icon svg{stroke:var(--blue);width:20px;height:20px;}
.loc-info{flex:1;}
.loc-title{font:700 15px system-ui;color:var(--text);margin-bottom:4px;}
.loc-subtitle{font:500 13px system-ui;color:var(--muted);}

/* Commodity in Silo List */
.detail-list{background:var(--card);border-radius:16px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.04);margin-bottom:20px;}
.detail-row{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);}
.detail-row:last-child{border-bottom:none;}

.com-row-left{display:flex;align-items:center;gap:12px;}
.com-icon{width:36px;height:36px;border-radius:8px;background:#fff8e1;display:flex;align-items:center;justify-content:center;}
.com-icon svg{width:20px;height:20px;fill:var(--orange);}
.com-name{font:700 15px system-ui;color:var(--text);}
.com-desc{font:500 12px system-ui;color:var(--muted);}
.com-qty{font:700 15px system-ui;color:var(--green);}

/* Breakdown Button */
.btn-outline{display:flex;align-items:center;justify-content:center;gap:10px;width:100%;padding:14px;border-radius:12px;border:1.5px solid var(--border);background:transparent;font:600 15px system-ui;color:var(--text);cursor:pointer;margin-bottom:20px;}

</style>
</head>
<body>

<div class="screen" id="screen">
  
  <div class="hdr">
    <button class="hdr-back" onclick="window.history.back()">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="hdr-title">Silo Details</div>
    <button class="hdr-btn-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2"><circle cx="12" cy="12" r="1"/><circle cx="19" cy="12" r="1"/><circle cx="5" cy="12" r="1"/></svg>
    </button>
  </div>

  <div class="body" id="body">
    
    <div class="overview-card">
      <div class="overview-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke-width="1.5">
          <path d="M4 22V6c0-2.5 4-4 8-4s8 1.5 8 4v16"/>
          <path d="M4 6c0 2.5 4 4 8 4s8-1.5 8-4"/>
          <path d="M4 12c0 2.5 4 4 8 4s8-1.5 8-4"/>
          <path d="M4 18c0 2.5 4 4 8 4s8-1.5 8-4"/>
        </svg>
      </div>
      <div class="overview-info">
        <div class="overview-title">Silo 1 - North</div>
        <div class="overview-subtitle">Wheat</div>
      </div>
    </div>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-lbl">Current Stock</div>
        <div class="stat-val">200 Tonne</div>
      </div>
      <div class="stat-box">
        <div class="stat-lbl">Capacity</div>
        <div class="stat-val dark">600 Tonne</div>
      </div>
    </div>
    
    <div class="stats-grid" style="grid-template-columns:1fr;">
      <div class="stat-box" style="flex-direction:row;justify-content:space-between;">
        <div style="text-align:left;">
          <div class="stat-lbl">Utilisation</div>
          <div class="stat-val dark">33%</div>
        </div>
        <div class="donut-wrap">
          <div class="donut-inner">33%</div>
        </div>
      </div>
    </div>

    <div class="sec-title">LOCATION</div>
    <div class="loc-card" onclick="window.location.href='location-detail.html'">
      <div class="loc-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
      </div>
      <div class="loc-info">
        <div class="loc-title">North Farm Storage Area</div>
      </div>
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--muted)" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
    </div>

    <div class="sec-title">COMMODITY IN SILO</div>
    <div class="detail-list">
      <div class="detail-row">
        <div class="com-row-left">
          <div class="com-icon">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
          </div>
          <div>
            <div class="com-name">Wheat</div>
            <div class="com-desc">APW1 grade</div>
          </div>
        </div>
        <div class="com-qty">200 Tonne</div>
      </div>
    </div>

    <button class="btn-outline">
      View History
    </button>

  </div>

  <!-- Bottom Nav -->
                                  <style id="unified-nav-style">
      #unified-nav.bottom-nav {
        flex: 0 0 auto;
        height: 70px;
        background: #fff;
        border-top: 1px solid #e8ede8;
        display: flex; align-items: center; justify-content: space-around;
        padding: 0 10px; gap: 5px;
        margin-top: auto; z-index: 100;
        position: relative;
      }
      #unified-nav .nav-item {
        flex: 1; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 4px;
        cursor: pointer; padding: 6px 4px; border: none; background: transparent; text-decoration: none;
      }
      #unified-nav .nav-icon {
        width: 44px; height: 44px;
        display: flex; align-items: center; justify-content: center;
        border-radius: 50%;
      }
      #unified-nav .nav-icon.active { background: var(--green-dark, #1b7239); }
      #unified-nav .nav-icon img, #unified-nav .nav-icon svg { width: 22px; height: 22px; opacity: 0.8; }
      #unified-nav .nav-icon.active img { filter: brightness(0) invert(1) !important; opacity: 1; }
      #unified-nav .nav-icon.active svg { stroke: #fff !important; opacity: 1; }
      #unified-nav .nav-label { font-size: 9px; font-weight: 600; color: var(--muted, #8898aa); text-align: center; line-height: 1.1; white-space: nowrap; margin: 0; }
      #unified-nav .nav-item.active .nav-label { color: var(--green-dark, #1b7239); }
    </style>
    <nav id="unified-nav" class="bottom-nav">
      <!-- Home -->
      <div class="nav-item " onclick="window.location.href='dashboard.html'">
        <div class="nav-icon "><img src="images/nav-home.png" alt="Home" /></div>
        <div class="nav-label">Home</div>
      </div>
      <!-- Contracting -->
      <div class="nav-item " onclick="window.location.href='jobs-hub.html'">
        <div class="nav-icon "><img src="images/nav-contract-work.png" alt="Contracting" /></div>
        <div class="nav-label">Contracting</div>
      </div>
      <!-- Inventory -->
      <div class="nav-item " onclick="window.location.href='commodity-catalog.html'">
        <div class="nav-icon ">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="7" width="20" height="14" rx="2" ry="2"/>
            <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/>
          </svg>
        </div>
        <div class="nav-label">Inventory</div>
      </div>
      <!-- Timesheets -->
      <div class="nav-item " onclick="window.location.href='timesheets-list.html'">
        <div class="nav-icon "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg></div>
        <div class="nav-label">Timesheets</div>
      </div>
      <!-- Map -->
      <div class="nav-item " onclick="window.location.href='farm-map.html'">
        <div class="nav-icon "><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#8898aa" stroke-width="2"><polygon points="1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6"/><line x1="8" y1="2" x2="8" y2="18"/><line x1="16" y1="6" x2="16" y2="22"/></svg></div>
        <div class="nav-label">Map</div>
      </div>
    </nav>
  </div>

<script>
  function applyScale() {
    const screen = document.getElementById('screen');
    const wh = window.innerHeight;
    if (wh < 880) {
      const scale = Math.min(1, (wh - 40) / 844);
      screen.style.setProperty('--app-scale', scale);
    } else {
      screen.style.setProperty('--app-scale', 1);
    }
  }
  window.addEventListener('resize', applyScale);
  applyScale();
</script>
</body>
</html>
